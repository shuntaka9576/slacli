name: Manual build test

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/release
        with:
          homebrew_tap_token: ""
          goreleaser_args: "release --snapshot --skip publish --clean"
